version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: realtimerx_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-pharma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharma123}
      POSTGRES_DB:       ${POSTGRES_DB:-pharmacydb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharma}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: realtimerx_app
    ports:
      - "5000:5000"                    # 🔥 ADDED
    env_file:
      - .env                           # 🔥 ADDED
    depends_on:
      db:
        condition: service_healthy     # 🔥 UPDATED (was missing proper condition)

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "8081:8080"                    # 🔥 ADDED
    volumes:
      - jenkins_home:/var/jenkins_home # 🔥 ADDED
      - /var/run/docker.sock:/var/run/docker.sock  # 🔥 ADDED (VERY IMPORTANT)

volumes:
  pgdata:
  jenkins_home:                        # 🔥 ADDED
