version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: realtimerx_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-pharma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharma123}
      POSTGRES_DB:       ${POSTGRES_DB:-pharmacydb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharma}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: realtimerx_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER:-pharma}:${POSTGRES_PASSWORD:-pharma123}@db:5432/${POSTGRES_DB:-pharmacydb}
      LOW_STOCK_THRESHOLD:  ${LOW_STOCK_THRESHOLD:-10}
      EXPIRY_WARNING_DAYS:  ${EXPIRY_WARNING_DAYS:-30}
      FLASK_DEBUG:          ${FLASK_DEBUG:-false}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
